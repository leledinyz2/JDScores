<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>🎵 Placar Just Dance do Lele 🎵</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/6373/6373791.png">
<meta name="theme-color" content="#FFD56B">

<style>
  :root {
    --bg-deep: #1a1a2e;
    --bg-mid: #16213e;
    --bg-low: #0f3460;
    --accent-pink: #ff2e63;
    --accent-lime: #bfff3b;
    --text: #eef0f6;
    --muted: #cfcfe0;
    --card-bg: rgba(255, 255, 255, 0.05);
    --card-border: rgba(255, 255, 255, 0.1);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Nunito", sans-serif;
    background-color: var(--bg-deep);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    padding: 20px;
    transition: background 0.5s ease;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    margin-bottom: 30px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 15px;
    backdrop-filter: blur(10px);
  }

  .brand h1 { margin: 0; font-size: 1.5rem; color: var(--accent-pink); }
  
  .header-actions { display: flex; gap: 15px; align-items: center; }
  
  select, input {
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--card-border);
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    outline: none;
    transition: 0.3s;
  }

  select:focus, input:focus {
    border-color: var(--accent-pink);
    box-shadow: 0 0 10px rgba(255, 46, 99, 0.3);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    transition: transform 0.3s ease;
  }
  .stat-card:hover { transform: translateY(-5px); }
  .stat-card i { font-size: 2rem; display: block; margin-bottom: 10px; }
  .stat-card strong { font-size: 2rem; display: block; color: var(--accent-pink); }
  .stat-card span { color: var(--muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

  .top-performances {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    padding: 25px;
    border-radius: 20px;
    margin-bottom: 30px;
  }
  .top-performances h2 { margin-top: 0; color: var(--accent-pink); font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
  
  .top-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 15px;
  }
  .top-item {
    background: rgba(0,0,0,0.2);
    padding: 15px;
    border-radius: 12px;
    border-left: 4px solid var(--accent-pink);
    transition: 0.3s;
  }
  .top-item:hover {
    transform: translateX(5px);
    border-left-color: var(--accent-lime);
  }
  .top-item .song-name { font-weight: bold; display: block; margin-bottom: 5px; }
  .top-item .song-score { color: var(--accent-pink); font-size: 1.1rem; }

  .main-content {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    padding: 25px;
    border-radius: 20px;
  }

  .filters {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 20px;
  }
  .filter-group { flex: 1; }
  .filter-group label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 0.8rem; font-weight: 600; }
  .filter-group input, .filter-group select { width: 100%; }

  .filter-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .btn-reset {
    background: rgba(255, 46, 99, 0.2);
    border: 1px solid var(--accent-pink);
    color: var(--accent-pink);
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    font-weight: 600;
  }
  .btn-reset:hover {
    background: var(--accent-pink);
    color: white;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }
  th { text-align: left; padding: 15px; color: var(--muted); font-size: 0.9rem; border-bottom: 1px solid var(--card-border); }
  td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  tr:hover { background: rgba(255,255,255,0.02); cursor: pointer; }

  .stars { color: #ffd700; }

  .results-info {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 15px;
  }

  /* Overlay de Senha */
  #senhaOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 10, 25, 0.95);
    backdrop-filter: blur(15px);
    display: flex; justify-content: center; align-items: center;
    z-index: 9999;
  }
  .senha-box {
    background: #1a1a2e;
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    border: 1px solid var(--accent-pink);
    box-shadow: 0 0 30px rgba(255, 46, 99, 0.2);
    max-width: 400px; width: 90%;
  }
  .senha-box h2 { color: white; margin-bottom: 20px; }
  .senha-box input { width: 100%; padding: 15px; margin-bottom: 20px; font-size: 1.2rem; text-align: center; }
  .senha-box button {
    background: var(--accent-pink);
    color: white; border: none; padding: 12px 30px;
    border-radius: 50px; font-weight: bold; cursor: pointer;
    transition: 0.3s;
  }
  .senha-box button:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--accent-pink); }
  #senhaErro { color: #ff4d4d; margin-top: 10px; display: none; }

  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    header { flex-direction: column; gap: 15px; }
    .filters { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="senhaOverlay">
  <div class="senha-box">
    <h2>Acesso Restrito</h2>
    <input type="password" id="senhaInput" placeholder="Digite a senha...">
    <button id="senhaBtn">Entrar</button>
    <p id="senhaErro">Senha incorreta!</p>
  </div>
</div>

<div class="container">
  <header>
    <div class="brand">
      <h1>🎵 Placar Just Dance</h1>
    </div>
    <div class="header-actions">
      <select id="themeSelect">
        <option value="default">Tema: Cyberpunk</option>
        <option value="verde">Tema: Esmeralda</option>
        <option value="roxo">Tema: Ametista</option>
      </select>
    </div>
  </header>

  <div class="stats-grid">
    <div class="stat-card">
      <span id="totalSongs">0</span>
      <span>Músicas</span>
    </div>
    <div class="stat-card">
      <span id="avgScore">0</span>
      <span>Maior Pontuação</span>
    </div>
    <div class="stat-card">
      <span id="topStar">—</span>
      <span>Máximo de Estrelas</span>
    </div>
  </div>

  <section class="top-performances">
    <h2>🏆 Top 10 Performances</h2>
    <div id="top10List" class="top-list">
      <!-- Inserido via JS -->
    </div>
  </section>

  <main class="main-content">
    <div class="filters">
      <div class="filter-group">
        <label>🔍 Buscar Música</label>
        <input type="text" id="buscaMusica" placeholder="Ex: Heart of Glass...">
      </div>
      <div class="filter-group">
        <label>📀 Versão</label>
        <select id="filtroVersao">
          <option value="">Todas as Versões</option>
        </select>
      </div>
      <div class="filter-group">
        <label>⭐ Pontuação</label>
        <select id="filtroPontuacao">
          <option value="">Todas as Pontuações</option>
          <option value="1">1⭐: 2000-4000</option>
          <option value="2">2⭐: 4000-6000</option>
          <option value="3">3⭐: 6000-8000</option>
          <option value="4">4⭐: 8000-10000</option>
          <option value="5">5⭐: 10000-11000</option>
          <option value="superstar">Superstar🩵: 11000-12000</option>
          <option value="megastar">Megastar🩷: 12000-13000</option>
          <option value="ultrastar">Ultrastar💚: +13000</option>
        </select>
      </div>
      <div class="filter-group">
        <label>🎮 Jogo</label>
        <select id="filtroJogo">
          <option value="">Todos os Jogos</option>
        </select>
      </div>
    </div>

    <div class="filter-actions">
      <button class="btn-reset" id="btnLimpar">🔄 Limpar Filtros</button>
    </div>

    <div class="results-info">
      Exibindo <strong id="resultCount">0</strong> de <strong id="totalCount">0</strong> músicas
    </div>

    <div style="overflow-x: auto;">
      <table id="tabela">
        <thead>
          <tr>
            <th>Música</th>
            <th>Versão</th>
            <th>Pontuação</th>
            <th>Estrelas</th>
            <th>Jogo</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <footer style="text-align: center; padding: 40px; color: var(--muted); font-size: 0.8rem;">
    Just Dance Scoreboard &copy; 2026 · LeleNY
  </footer>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTas34kcpM1cQdW2oR_XjNlINTVShbwfTyVdYnBe2glvdvlJbcDlbQ0npgTdJZ_6p-tQgozmHmnsCQy/pub?gid=0&single=true&output=csv";

function parseCSV(text) {
  const rows = [];
  let i = 0, cur = '', row = [], inQuotes = false;
  while (i < text.length) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i + 1] === '"') { cur += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      } else { cur += ch; i++; continue; }
    } else {
      if (ch === '"') { inQuotes = true; i++; continue; }
      if (ch === ',') { row.push(cur); cur = ''; i++; continue; }
      if (ch === '\r') { i++; continue; }
      if (ch === '\n') { row.push(cur); rows.push(row); row = []; cur = ''; i++; continue; }
      cur += ch; i++;
    }
  }
  if (cur !== '' || row.length) row.push(cur);
  if (row.length) rows.push(row);
  return rows;
}

async function carregarDados() {
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const parsed = parseCSV(text);
  const headers = parsed[0].map(h => h.trim());
  const dados = parsed.slice(1).map(r => {
    const obj = {};
    headers.forEach((h, i) => {
      obj[h] = (r[i] || "").replace(/['"]+/g, "").replace(/\r?\n/g, " ").trim();
    });
    return obj;
  });
  return { headers, dados };
}

function detectColumns(headers) {
  const find = (names) => headers.find(h => names.some(n => h.toLowerCase().includes(n))) || null;
  return {
    musica: find(["música", "musica", "song"]) || headers[0],
    versao: find(["versão", "versao", "version"]) || headers[1],
    pontuacao: find(["pontuação", "pontuacao", "score"]) || headers[2],
    estrelas: find(["estrela", "estrelas", "stars"]) || null,
    jogo: find(["jogo", "game"]) || headers[headers.length - 1],
  };
}

function getScoreValue(pontuacaoStr) {
  if (!pontuacaoStr) return 0;
  const num = parseFloat(pontuacaoStr.replace(/[^\d.,]/g, "").replace(",", "."));
  return isNaN(num) ? 0 : num;
}

function getPontuacaoCategory(score) {
  if (score >= 13000) return "ultrastar";
  if (score >= 12000) return "megastar";
  if (score >= 11000) return "superstar";
  if (score >= 10000) return "5";
  if (score >= 8000) return "4";
  if (score >= 6000) return "3";
  if (score >= 4000) return "2";
  if (score >= 2000) return "1";
  return null;
}

function renderTop10(dados, cols) {
  const top10 = [...dados]
    .map(d => {
      const score = getScoreValue(d[cols.pontuacao]);
      return { ...d, scoreVal: score };
    })
    .sort((a, b) => b.scoreVal - a.scoreVal)
    .slice(0, 10);

  const container = document.getElementById("top10List");
  container.innerHTML = top10.map(d => `
    <div class="top-item">
      <span class="song-name">${d[cols.musica]}</span>
      <span class="song-score">${d[cols.pontuacao]}</span>
    </div>
  `).join("");
}

function exibirTabela(dados, cols) {
  const tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";
  
  document.getElementById("resultCount").textContent = dados.length;
  document.getElementById("totalCount").textContent = ALL_DATA.length;

  dados.forEach(d => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${d[cols.musica] || ""}</td>
      <td>${d[cols.versao] || ""}</td>
      <td>${d[cols.pontuacao] || ""}</td>
      <td class="stars">${d[cols.estrelas] || ""}</td>
      <td>${d[cols.jogo] || ""}</td>
    `;
    tr.onclick = () => {
      const slug = (d[cols.musica] || "").trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, "_").replace(/[^\w\-_.]/g, "");
      window.open("https://justdance.fandom.com/wiki/" + encodeURIComponent(slug), "_blank");
    };
    tbody.appendChild(tr);
  });
}

function updateStats(dados, cols) {
  document.getElementById("totalSongs").textContent = dados.length;
  
  const scores = dados.map(d => getScoreValue(d[cols.pontuacao])).filter(v => v > 0);
  document.getElementById("avgScore").textContent = scores.length ? Math.max(...scores).toLocaleString() : "0";

  let maxScore = 0;
  let maxStarStr = "—";
  dados.forEach(d => {
    const score = getScoreValue(d[cols.pontuacao]);
    if (score > maxScore) {
      maxScore = score;
      maxStarStr = d[cols.estrelas] || "—";
    }
  });
  document.getElementById("topStar").textContent = maxStarStr;
}

function sortVersions(versions) {
  const numVersions = [];
  const yearVersions = [];

  versions.forEach(v => {
    const num = parseInt(v);
    if (!isNaN(num) && num < 100) {
      numVersions.push(num);
    } else {
      yearVersions.push(v);
    }
  });

  numVersions.sort((a, b) => a - b);
  yearVersions.sort((a, b) => a - b);

  return [...numVersions.map(String), ...yearVersions];
}

function preencherFiltros(dados, cols) {
  const versoes = new Set();
  const jogos = new Set();

  dados.forEach(d => {
    if (d[cols.versao]) versoes.add(d[cols.versao]);
    if (d[cols.jogo]) jogos.add(d[cols.jogo]);
  });

  const selectVersao = document.getElementById("filtroVersao");
  const selectJogo = document.getElementById("filtroJogo");

  const sortedVersions = sortVersions(Array.from(versoes));
  sortedVersions.forEach(v => {
    const option = document.createElement("option");
    option.value = v;
    option.textContent = v;
    selectVersao.appendChild(option);
  });

  Array.from(jogos).sort().forEach(j => {
    const option = document.createElement("option");
    option.value = j;
    option.textContent = j;
    selectJogo.appendChild(option);
  });
}

function aplicarFiltros() {
  const busca = document.getElementById("buscaMusica").value.toLowerCase();
  const versao = document.getElementById("filtroVersao").value;
  const pontuacao = document.getElementById("filtroPontuacao").value;
  const jogo = document.getElementById("filtroJogo").value;

  const filtered = ALL_DATA.filter(d => {
    const nomeMatch = (d[COLS.musica] || "").toLowerCase().includes(busca);
    const versaoMatch = !versao || (d[COLS.versao] || "") === versao;
    const jogoMatch = !jogo || (d[COLS.jogo] || "") === jogo;
    
    let pontuacaoMatch = true;
    if (pontuacao) {
      const score = getScoreValue(d[COLS.pontuacao]);
      const category = getPontuacaoCategory(score);
      pontuacaoMatch = category === pontuacao;
    }

    return nomeMatch && versaoMatch && jogoMatch && pontuacaoMatch;
  });

  exibirTabela(filtered, COLS);
}

let ALL_DATA = [];
let COLS = {};

async function init() {
  const { headers, dados } = await carregarDados();
  ALL_DATA = dados;
  COLS = detectColumns(headers);
  
  updateStats(ALL_DATA, COLS);
  preencherFiltros(ALL_DATA, COLS);
  renderTop10(ALL_DATA, COLS);
  exibirTabela(ALL_DATA, COLS);
}

document.getElementById("buscaMusica").oninput = aplicarFiltros;
document.getElementById("filtroVersao").onchange = aplicarFiltros;
document.getElementById("filtroPontuacao").onchange = aplicarFiltros;
document.getElementById("filtroJogo").onchange = aplicarFiltros;

document.getElementById("btnLimpar").onclick = () => {
  document.getElementById("buscaMusica").value = "";
  document.getElementById("filtroVersao").value = "";
  document.getElementById("filtroPontuacao").value = "";
  document.getElementById("filtroJogo").value = "";
  exibirTabela(ALL_DATA, COLS);
};

// Senha
const senhaCorreta = "bluecooky";
document.getElementById("senhaBtn").onclick = () => {
  if (document.getElementById("senhaInput").value === senhaCorreta) {
    document.getElementById("senhaOverlay").style.display = "none";
  } else {
    document.getElementById("senhaErro").style.display = "block";
  }
};

// Temas
const temas = {
  default: { pink: "#ff2e63", deep: "#1a1a2e", mid: "#16213e" },
  verde: { pink: "#bfff3b", deep: "#1b2e1a", mid: "#1e3e16" },
  roxo: { pink: "#c39bff", deep: "#2e1a2e", mid: "#3e163e" }
};

document.getElementById("themeSelect").onchange = (e) => {
  const t = temas[e.target.value];
  document.documentElement.style.setProperty("--accent-pink", t.pink);
  document.documentElement.style.setProperty("--bg-deep", t.deep);
  document.documentElement.style.setProperty("--bg-mid", t.mid);
};

init();
</script>
</body>
</html>
